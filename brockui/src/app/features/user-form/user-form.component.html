<form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>

  <div class="form-section">
    <h3 class="section-title">User Details</h3>

    <!-- Name -->
    <div class="field">
      <label>Name</label>
      <input formControlName="name" type="text" placeholder="Your name" />
      <span class="error" *ngIf="nameCtrl.touched && nameCtrl.invalid">
        Name is required (min 2 chars).
      </span>
    </div>

    <!-- Age -->
    <div class="field">
      <label>Age <span class="hint">(1–59)</span></label>
      <input formControlName="age" type="number" min="1" max="59" />
      <span class="error" *ngIf="ageCtrl.touched && ageCtrl.invalid">
        Age must be between 1 and 59.
      </span>
    </div>

    <!-- Wage -->
    <div class="field">
      <label>Monthly Wage <span class="hint">(₹)</span></label>
      <input formControlName="wage" type="number" min="1" />
      <span class="error" *ngIf="wageCtrl.touched && wageCtrl.invalid">
        Wage must be greater than 0.
      </span>
    </div>

    <!-- Inflation -->
    <div class="field">
      <label>Inflation Rate <span class="hint">(e.g. 0.055 for 5.5%)</span></label>
      <input formControlName="inflation" type="number" step="0.001" min="0" max="1" />
    </div>
  </div>

  <div class="form-section">
    <h3 class="section-title">Expenses JSON</h3>
    <div class="field">
      <label>Expenses <span class="hint">[ &#123; date, amount &#125; ]</span></label>
      <textarea
        [(ngModel)]="expensesJson"
        [ngModelOptions]="{ standalone: true }"
        rows="6"
        spellcheck="false">
      </textarea>
      <span class="error" *ngIf="jsonErrors['expenses']">{{ jsonErrors['expenses'] }}</span>
    </div>
  </div>

  <div class="form-section">
    <h3 class="section-title">Period Rules</h3>

    <!-- Q Periods -->
    <div class="field">
      <label>Q Periods <span class="hint">Fixed override [ &#123; fixed, start, end &#125; ]</span></label>
      <textarea
        [(ngModel)]="qJson"
        [ngModelOptions]="{ standalone: true }"
        rows="4"
        spellcheck="false">
      </textarea>
      <span class="error" *ngIf="jsonErrors['q']">{{ jsonErrors['q'] }}</span>
    </div>

    <!-- P Periods -->
    <div class="field">
      <label>P Periods <span class="hint">Additive extra [ &#123; extra, start, end &#125; ]</span></label>
      <textarea
        [(ngModel)]="pJson"
        [ngModelOptions]="{ standalone: true }"
        rows="4"
        spellcheck="false">
      </textarea>
      <span class="error" *ngIf="jsonErrors['p']">{{ jsonErrors['p'] }}</span>
    </div>

    <!-- K Periods -->
    <div class="field">
      <label>K Periods <span class="hint">Grouping ranges [ &#123; start, end &#125; ]</span></label>
      <textarea
        [(ngModel)]="kJson"
        [ngModelOptions]="{ standalone: true }"
        rows="4"
        spellcheck="false">
      </textarea>
      <span class="error" *ngIf="jsonErrors['k']">{{ jsonErrors['k'] }}</span>
    </div>
  </div>

  <!-- Error -->
  <div class="api-error" *ngIf="errorMsg">
    <span>⚠ {{ errorMsg }}</span>
  </div>

  <!-- Submit -->
  <button type="submit" class="btn-submit" [disabled]="isLoading">
    <span *ngIf="!isLoading">Submit Form</span>
    <span *ngIf="isLoading" class="spinner">Computing…</span>
  </button>

</form>
